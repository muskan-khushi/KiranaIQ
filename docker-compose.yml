version: '3.9'

services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - ./ai_pipeline:/ai_pipeline
      - uploads_data:/app/uploads
    depends_on:
      - mongo
      - redis

  celery_worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - ./ai_pipeline:/ai_pipeline
      - uploads_data:/app/uploads
    depends_on:
      - redis
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
  uploads_data: